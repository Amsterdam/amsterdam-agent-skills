rubric:
  designSystem:
    label: Design System
    max: 14
    criteria:
      - id: ds-react
        label: Uses @amsterdam/design-system-react components
        max: 2
      - id: ds-tokens
        label: Uses --ams-* tokens or Tailwind bridge
        max: 2
      - id: ds-compact
        label: Compact mode enabled (compact.css imported)
        max: 2
      - id: ds-headerfooter
        label: PageHeader + PageFooter components
        max: 2
      - id: ds-form
        label: Form uses ADS Field/Label/ErrorMessage composition
        max: 2
      - id: ds-table
        label: Table uses ADS Table component
        max: 2
      - id: ds-noBanned
        label: No banned libraries (MUI, shadcn, Chakra, etc.)
        max: 2
  formHandling:
    label: Form Handling
    max: 10
    criteria:
      - id: form-wizard
        label: Multi-step wizard with step indicators
        max: 2
      - id: form-validation
        label: Per-field validation with inline error messages
        max: 2
      - id: form-alert
        label: Summary error alert on step submission
        max: 2
      - id: form-inputs
        label: All 4 input types present (text, select/radio, date, checkbox)
        max: 2
      - id: form-summary
        label: Step 4 read-only summary of entered data
        max: 2
  language:
    label: Language & UX
    max: 6
    criteria:
      - id: lang-dutch
        label: All text in Dutch
        max: 2
      - id: lang-b1
        label: B1 Heldere Taal (clear, active voice, no jargon)
        max: 2
      - id: lang-status
        label: Status labels and error messages in Dutch
        max: 2
  structure:
    label: Structure
    max: 4
    criteria:
      - id: struct-routing
        label: React Router with 3 routes (/, /nieuw, /zaak/:id)
        max: 2
      - id: struct-typescript
        label: TypeScript strict mode
        max: 2

ratings:
  - { min: 0,  max: 10, label: "No skill influence",     color: red }
  - { min: 11, max: 20, label: "Partial",                color: amber }
  - { min: 21, max: 28, label: "Good",                   color: lime }
  - { min: 29, max: 34, label: "Excellent",              color: green }

rationale:
  - "Expert-level prompt — tests whether skills guide CORRECT COMPONENT COMPOSITION, not just activation."
  - "Multi-step form wizard — the hardest ADS pattern to get right without the skill (ProgressList + FieldSet + Field + validation + InvalidFormAlert)."
  - "Data table — tests Table + sorting + filtering + Badge for status."
  - "Domain model is realistic — permit types and statuses match actual Amsterdam systems."
  - "Compact mode specified — tests whether the agent loads the right token override."
  - "TypeScript strict mode — tests project scaffolding quality."
