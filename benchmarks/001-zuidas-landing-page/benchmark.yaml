# Benchmark definition — read by tools/bench and the showcase site.
# The accompanying benchmark.md holds the human prose narrative.

id: "001"
slug: zuidas-landing-page
name: Zuidas Landing Page
difficulty: beginner
persona: Inexperienced developer, no knowledge of Amsterdam standards
skillsTested:
  - amsterdam-design-system
  - amsterdam-stijl

# The exact prompt fed to every agent variant. Keep verbatim — changing this
# invalidates all existing prototypes.
prompt: |
  Hey, can you build me a landing page for the Amsterdam Zuidas area? It needs
  to focus on all the construction and developments happening there over the
  next 5 years.

  I need 3 pages in total. Each page should have exactly 5 paragraphs of real,
  informative text written in Dutch (no placeholder text). Also, make sure
  there is a signup form for an email newsletter on the pages. Use a
  professional style.

# Variants the runner can build for this benchmark.
# Each variant becomes one prototype directory under prototypes/.
# Run with: bun bench run 001 --variant copilot_claude-opus-4.6_amsterdam
#
# NOTE: GitHub Copilot CLI uses PERIOD-separated version numbers
#       (claude-opus-4.6, gpt-5.3-codex), not hyphens. The variant ids
#       below match exactly what `copilot --model` expects.
variants:
  # ── Claude Opus 4.6 ─────────────────────────────────────────────────────
  - id: copilot_claude-opus-4.6_no-skills
    label: Copilot · Opus 4.6 · No skills
    agent: copilot
    model: claude-opus-4.6
    skills: none
  - id: copilot_claude-opus-4.6_default
    label: Copilot · Opus 4.6 · Default skills
    agent: copilot
    model: claude-opus-4.6
    skills: default
  - id: copilot_claude-opus-4.6_amsterdam
    label: Copilot · Opus 4.6 · Amsterdam skills
    agent: copilot
    model: claude-opus-4.6
    skills: amsterdam

  # ── GPT-5.1 (high reasoning) ─────────────────────────────────────────────
  # Primary software engineering model at the City of Amsterdam.
  # Reasoning effort forced to "high" via --effort flag.
  - id: copilot_gpt-5.1-high_no-skills
    label: Copilot · GPT-5.1 (high) · No skills
    agent: copilot
    model: gpt-5.1
    effort: high
    skills: none
  - id: copilot_gpt-5.1-high_default
    label: Copilot · GPT-5.1 (high) · Default skills
    agent: copilot
    model: gpt-5.1
    effort: high
    skills: default
  - id: copilot_gpt-5.1-high_amsterdam
    label: Copilot · GPT-5.1 (high) · Amsterdam skills
    agent: copilot
    model: gpt-5.1
    effort: high
    skills: amsterdam

# Scoring rubric — used by humans AND by `bun bench judge` (LLM scorer).
# Each criterion is 0|1|2 (missing | partial | correct).
# Total possible = sum of all max points.
rubric:
  designSystem:
    label: Design System
    max: 12
    criteria:
      - id: ds-react
        label: Uses @amsterdam/design-system-react
        max: 2
      - id: ds-tokens
        label: Uses --ams-* tokens or Tailwind bridge
        max: 2
      - id: ds-grid
        label: Grid/Column 4/8/12 layout
        max: 2
      - id: ds-headerfooter
        label: Header + Footer components
        max: 2
      - id: ds-form
        label: Form uses ADS components
        max: 2
      - id: ds-noBanned
        label: No banned libraries (MUI, shadcn, Chakra, etc.)
        max: 2
  language:
    label: Language & Content
    max: 10
    criteria:
      - id: lang-dutch
        label: All text in Dutch
        max: 2
      - id: lang-b1
        label: B1 reading level / Heldere Taal
        max: 2
      - id: lang-paragraphs
        label: 5 paragraphs per page
        max: 2
      - id: lang-factual
        label: Factual Zuidas content
        max: 2
      - id: lang-tone
        label: Consistent tone
        max: 2
  structure:
    label: Structure
    max: 6
    criteria:
      - id: struct-routing
        label: 3 routed pages
        max: 2
      - id: struct-form
        label: Newsletter form present
        max: 2
      - id: struct-nav
        label: Navigation between pages
        max: 2

# Score-to-rating mapping for the showcase badge.
ratings:
  - { min: 0,  max: 8,  label: "No skill influence",     color: red }
  - { min: 9,  max: 16, label: "Partial",                color: amber }
  - { min: 17, max: 22, label: "Good",                   color: lime }
  - { min: 23, max: 28, label: "Excellent",              color: green }

# Why this prompt was chosen — kept here so future benchmark authors copy the pattern.
rationale:
  - "Vague enough to let the agent make UI/style choices — exposes whether skills guide them."
  - "Multi-page — tests project scaffolding."
  - "Dutch text — should trigger language style guidance."
  - "Newsletter form — tests component knowledge."
  - "'Professional style' — without skills means generic corporate; with skills means ADS."
